<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CRSkip</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg:      #0d0d0f;
    --surface: #16161a;
    --border:  #2a2a32;
    --accent:  #f47521;
    --accent2: #ff9a56;
    --text:    #e8e6e3;
    --muted:   #6b6876;
    --danger:  #e05c5c;
    --on:      #3ecf74;
    --radius:  10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 340px;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding-bottom: 12px;
    overflow: hidden;
  }

  header {
    background: linear-gradient(135deg, #1a1218 0%, #12101a 100%);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .brand { display: flex; align-items: center; gap: 8px; }
  .brand-icon {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 8px;
    display: grid; place-items: center;
  }
  .brand-icon svg { fill: white; width: 16px; height: 16px; }
  .brand-name {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700; font-size: 18px; letter-spacing: 1px;
  }
  .brand-name span { color: var(--accent); }

  .master-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
  }
  .master-label {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600; font-size: 15px; letter-spacing: .5px;
  }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted);
    display: inline-block; margin-right: 6px;
    transition: background .3s;
  }
  .status-dot.on { background: var(--on); box-shadow: 0 0 6px var(--on); }

  .toggle { position: relative; width: 44px; height: 24px; cursor: pointer; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-track {
    position: absolute; inset: 0;
    background: var(--border); border-radius: 999px;
    transition: background .25s;
  }
  .toggle input:checked ~ .toggle-track { background: var(--accent); }
  .toggle-thumb {
    position: absolute; top: 3px; left: 3px;
    width: 18px; height: 18px;
    background: white; border-radius: 50%;
    transition: transform .25s;
    box-shadow: 0 1px 4px rgba(0,0,0,.4);
  }
  .toggle input:checked ~ .toggle-thumb { transform: translateX(20px); }

  section { padding: 12px 16px 0; }
  .section-title {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600; font-size: 11px;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 8px;
  }

  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    display: flex; align-items: center; gap: 5px;
    padding: 5px 10px; border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--surface);
    cursor: pointer; user-select: none;
    font-size: 12px; font-weight: 500; color: var(--muted);
    transition: border-color .2s, color .2s, background .2s;
  }
  .chip.active {
    border-color: var(--accent);
    color: var(--accent2);
    background: rgba(244,117,33,.08);
  }
  .chip-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  .divider { height: 1px; background: var(--border); margin: 12px 16px 0; }

  .exclusion-add { display: flex; gap: 6px; margin-bottom: 8px; }
  .exclusion-add input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; padding: 6px 10px; outline: none;
    transition: border-color .2s;
  }
  .exclusion-add input::placeholder { color: var(--muted); }
  .exclusion-add input:focus { border-color: var(--accent); }

  .btn-add {
    background: var(--accent); color: white; border: none;
    border-radius: var(--radius); padding: 6px 12px;
    cursor: pointer;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600; font-size: 13px; letter-spacing: .5px;
    transition: background .2s;
  }
  .btn-add:hover { background: var(--accent2); }

  .exclusion-list {
    display: flex; flex-direction: column; gap: 5px;
    max-height: 130px; overflow-y: auto; padding-right: 2px;
  }
  .exclusion-list::-webkit-scrollbar { width: 3px; }
  .exclusion-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .exclusion-item {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 10px; gap: 8px;
    animation: slideIn .2s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .exclusion-info { display: flex; flex-direction: column; gap: 1px; }
  .exclusion-anime {
    font-weight: 500; font-size: 12px; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px;
  }
  .exclusion-ep { font-size: 10px; color: var(--muted); }

  .btn-remove {
    background: none; border: none; color: var(--muted);
    cursor: pointer; padding: 2px 4px; border-radius: 4px;
    font-size: 14px; line-height: 1; flex-shrink: 0;
    transition: color .2s, background .2s;
  }
  .btn-remove:hover { color: var(--danger); background: rgba(224,92,92,.1); }

  .empty-state {
    text-align: center; color: var(--muted);
    font-size: 11px; padding: 12px 0; font-style: italic;
  }

  .footer {
    margin: 12px 16px 0;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 8px 12px;
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; color: var(--muted);
  }
  .footer-icon { font-size: 14px; }
  .footer strong { color: var(--text); font-weight: 500; }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24"><path d="M6 18L18 12 6 6v12z"/></svg>
    </div>
    <span class="brand-name">CR<span>Skip</span></span>
  </div>
  <span id="statusText" style="font-size:11px; color:var(--muted);">Inactive</span>
</header>

<div class="master-row">
  <span class="master-label">
    <span class="status-dot" id="statusDot"></span>Auto-Skip
  </span>
  <label class="toggle">
    <input type="checkbox" id="masterToggle" />
    <span class="toggle-track"></span>
    <span class="toggle-thumb"></span>
  </label>
</div>

<section>
  <div class="section-title">Skip Types</div>
  <div class="chips" id="chipContainer">
    <div class="chip" data-type="intro">   <span class="chip-dot"></span> Intro   </div>
    <div class="chip" data-type="opening"> <span class="chip-dot"></span> Opening </div>
    <div class="chip" data-type="recap">   <span class="chip-dot"></span> Recap   </div>
    <div class="chip" data-type="credits"> <span class="chip-dot"></span> Credits </div>
  </div>
</section>

<div class="divider"></div>

<div class="footer">
  <span class="footer-icon">ℹ️</span>
  <span>Only <strong>exact skip-type buttons</strong> are clicked — no accidental "Next Episode".</span>
</div>

<script src="popup.js"></script>
</body>
</html>
